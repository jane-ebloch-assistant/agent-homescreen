<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hiro Agent Homescreen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f0f0f5 0%, #8888a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: #8888a0; margin-bottom: 32px; }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #55556a;
      margin-bottom: 12px;
      margin-top: 24px;
    }
    .versions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    a {
      display: block;
      padding: 20px 32px;
      background: #16161f;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      color: #f0f0f5;
      text-decoration: none;
      font-weight: 600;
      font-size: 18px;
      transition: all 0.2s;
    }
    a:hover {
      background: #1c1c28;
      border-color: #4a9eff;
      transform: translateY(-2px);
    }
    a span {
      display: block;
      font-size: 12px;
      font-weight: 400;
      color: #8888a0;
      margin-top: 4px;
    }
    a.new::after {
      content: 'NEW';
      font-size: 9px;
      background: #4a9eff;
      color: white;
      padding: 2px 6px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <h1>Hiro Prototypes</h1>
  <p>Mobile UI explorations</p>
  
  <div class="section-label">Homescreen</div>
  <div class="versions">
    <a href="v1/">
      v1
      <span>General widgets</span>
    </a>
    <a href="v2/">
      v2
      <span>Financial focus</span>
    </a>
    <a href="v3/">
      v3
      <span>Task-based + chat</span>
    </a>
  </div>
  
  <div class="section-label">Inbox</div>
  <div class="versions">
    <a href="inbox/" class="new">
      v1
      <span>Email command center</span>
    </a>
  </div>
</body>
</html>
